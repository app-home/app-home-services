services:
  postgres:
    image: docker.io/postgres:17-alpine
    environment:
      POSTGRES_USER: app_home
      POSTGRES_PASSWORD: app_home_test
      POSTGRES_DB: app_home_test
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "app_home"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "15432:5432"
    networks:
      - test-net

  redis:
    image: docker.io/redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "16379:6379"
    networks:
      - test-net

  test-runner:
    build:
      context: .
      dockerfile: Containerfile
    environment:
      DATABASE_URL: postgres://app_home:app_home_test@postgres/app_home_test
      REDIS_URL: redis://redis:6379
      JWT_SECRET: test-secret-key-for-podman-test-environment
      DEFAULT_USER_PASSWORD: test-password
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - cargo-target:/app/target
    command: cargo test -- --ignored
    networks:
      - test-net

volumes:
  cargo-target:

networks:
  test-net:
    driver: bridge
