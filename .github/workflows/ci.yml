name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-lockfile-check:
    name: Build (locked) + lockfile freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # `--locked` fails the build outright if Cargo.toml and Cargo.lock have drifted
      # (e.g. a dependency was added/bumped in Cargo.toml without an accompanying
      # `cargo update`/`cargo build` to refresh Cargo.lock), instead of silently
      # resolving new versions in CI. This is what issue #19 asked for: a missing or
      # stale lockfile should fail fast here rather than drift unnoticed.
      - name: cargo build --locked
        run: cargo build --locked --all-targets

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Only the unit test suite runs in CI. Integration tests under
      # tests/integration are #[ignore]'d and require a running Postgres, Redis, and
      # the service itself (see each file's header comment) -- standing that up in CI
      # is left as a separate, follow-up piece of work rather than bundled into this
      # lockfile-focused workflow.
      - name: cargo test (unit)
        run: cargo test --locked --lib